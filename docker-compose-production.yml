version: "3.8"

volumes:
  mongodata:
  vol-emqx-data:
    name: foo-emqx-data
#  vol-emqx-etc:
#    name: foo-emqx-etc
  vol-emqx-log:
    name: foo-emqx-log

services:

  node:
    container_name: node
    image: "node:18.17.0"
    restart: always
    working_dir: /home/node/app
    volumes:
      - ./mycode/index.js:/home/node/app/index.js
    ports:
      - 3000:3000
      - 3001:3001
      - 80:3002
    links:
      - emqx
      - mongo
    command: sh -c "node index.js"

  mongo:
    container_name: mongo
    image: mongo:6.0
    restart: always
    environment:
      TZ: "${TZ}"
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
    volumes:
      - mongodata:/data/db   # Al realizar una modificación en docker, al no utilizar docker desktop, se instaló docker solo en wsl y no se realiza un bind mount, por lo que se accesa desde wsl2 directamente, sin pasar por windows (ojo que al final aunque sea directamente a wsl2, se almacena en windows)
    ports:
      - ${MONGO_EXT_PORT}:27017



  emqx:
    container_name: emqx
    image: emqx/emqx:4.4.19
    restart: always
    ports:
      - 18083:18083
##      - 18084:18084
      - 1883:1883
      - 8883:8883
      - 8083:8083
#      - 8084:8084
      - 8085:8081

    volumes:
     - vol-emqx-data:/opt/emqx/data
#     - vol-emqx-etc:/opt/emqx/etc
     - vol-emqx-log:/opt/emqx/log
   
    links:
      - mongo
    extra_hosts:
      - "host.docker.internal:host-gateway" #This can not be necessary if we add the ip windows ipv4 in resource

    #  - "localhost:192.168.1.100" #aqui colocar la ip de red del host. PERO OJO, PARECE QUE ASÍ NO FUNCIONA
    # SE DEJA VACIO ESTE CAMPO Y SE COLOCA http://host.docker.internal:3001 EN EL RECURSO DE EMQX, PUEDE SER PORQUE ESTA EN WSL2, ENTONCES PARA QUE CONECTE CON WINDOWS

    environment: 
      
      EMQX_NAME: ioticos-gl
      EMQX_HOST: 127.0.0.1

      TZ: "${TZ}"

      # DEFAULT DASH PASS
      EMQX_DASHBOARD__DEFAULT_USER__PASSWORD: "${EMQX_DEFAULT_USER_PASSWORD}"  #CLAVE DE INGRESO POR DEFECTO

      # DEFAULT APP SECRET
      EMQX_MANAGEMENT__DEFAULT_APPLICATION__SECRET: "${EMQX_DEFAULT_APPLICATION_SECRET}" #CLAVE DE LA APLICACION POR DEFECTO
      EMQX_ALLOW_ANONYMOUS: "false" #IMPIDE QUE SE CONECTE CUALQUIERA SIN AUTENTICACIÓN
      EMQX_NOMATCH: "deny" #impide que se conecten a cualquier tópico por defecto, tiene que etar así para que funcionen las reglas de acceso de mongo

      # MONGO CONNECTION
      EMQX_AUTH__MONGO__TYPE: single
      EMQX_AUTH__MONGO__TOPOLOGY__POOL_SIZE: 1
      EMQX_AUTH__MONGO__TOPOLOGY__MAX_OVERFLOW: 0

      EMQX_AUTH__MONGO__SERVER: "mongo:${MONGO_EXT_PORT}"
      EMQX_AUTH__MONGO__POOL: 8

      EMQX_AUTH__MONGO__LOGIN: "${MONGO_USERNAME}"
      EMQX_AUTH__MONGO__PASSWORD: "${MONGO_PASSWORD}"
      EMQX_AUTH__MONGO__AUTH_SOURCE: admin

      EMQX_AUTH__MONGO__DATABASE: "iotgl2"
      EMQX_AUTH__MONGO__AUTH_QUERY__COLLECTION: "emqxauthrules"

      EMQX_AUTH__MONGO__SUPER_QUERY__COLLECTION: "emqxauthrules"
      EMQX_AUTH__MONGO__SUPER_QUERY__SUPER_FIELD: "is_superuser"
      EMQX_AUTH__MONGO__SUPER_QUERY__SELECTOR: "username=%u"
      EMQX_AUTH__MONGO__SUPER_QUERY: "off"

      EMQX_AUTH__MONGO__AUTH_QUERY__PASSWORD_HASH: plain
      EMQX_AUTH__MONGO__AUTH_QUERY__PASSWORD_FIELD: "password"
      EMQX_AUTH__MONGO__AUTH_QUERY__SELECTOR: "username=%u"

      ## Enable ACL query.
      #Access control list
      EMQX_AUTH__MONGO__ACL_QUERY: "on"
      EMQX_AUTH__MONGO__ACL_QUERY__COLLECTION: "emqxauthrules"
      EMQX_AUTH__MONGO__ACL_QUERY__SELECTOR: "username=%u"

      EMQX_LOADED_PLUGINS: "emqx_recon,emqx_retainer,emqx_management,emqx_dashboard, emqx_auth_mongo"



      EMQX_LISTENER__TCP__EXTERNAL__MAX_CONNECTIONS: 1000


      




