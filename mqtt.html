<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prueba EMQX WebSocket + Webhook</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    h1 { color: #333; }
    #log { border: 1px solid #ccc; padding: 10px; background: #fff; height: 400px; overflow-y: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>EMQX WebSocket Test + Webhook</h1>
  <div id="log"></div>

  <!-- MQTT.js -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script>
    const logDiv = document.getElementById('log');
    function log(msg, type) {
      const p = document.createElement('p');
      p.textContent = msg;
      if(type) p.className = type;
      logDiv.appendChild(p);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Configuración EMQX
    const brokerURL = 'ws://localhost:8083/mqtt';
    const clientId = 'ws_browser_' + Math.floor(Math.random() * 1000);
    const username = 'admin';
    const password = 'emqxdashpass';
    const topic = 'sensor/data';
    const intervalMs = 5000;

    // Endpoint de tu webhook (API Windows)
    const webhookURL = 'http://host.docker.internal:3001/api/saver-webhook';

    // Conectar al broker EMQX
    const client = mqtt.connect(brokerURL, { clientId, username, password, clean: true });

    client.on('connect', () => {
      log('✅ Conectado a EMQX WebSocket', 'success');

      // Publicar mensaje automáticamente cada X segundos
      setInterval(() => {
        const payload = {
          timestamp: new Date().toISOString(),
          value: Math.floor(Math.random() * 100)
        };

        // Publicar en EMQX
        client.publish(topic, JSON.stringify(payload), { qos: 0 }, (err) => {
          if(err) log('❌ Error publicando: ' + err, 'error');
          else {
            log(`📤 Mensaje publicado en ${topic}: ${JSON.stringify(payload)}`);

            // Simular el webhook (POST al endpoint) desde el navegador
            fetch(webhookURL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            })
            .then(res => res.text())
            .then(data => log(`📬 Webhook enviado a ${webhookURL} → respuesta: ${data}`, 'success'))
            .catch(e => log(`❌ Error enviando webhook: ${e}`, 'error'));
          }
        });
      }, intervalMs);
    });

    client.on('error', (err) => log('❌ Error WebSocket: ' + err, 'error'));
    client.on('close', () => log('⚠️ Conexión cerrada', 'error'));
    client.on('reconnect', () => log('♻️ Reconectando...'));
  </script>
</body>
</html>
